  - id: es-001
    clause_type: notice-service
    jurisdiction: NS
    rule_summary: "For documents served electronically under the Residential Tenancies Act (other than Director-application and Small Claims Court appeal documents), service must be sent to the other party's most-recently provided electronic address - in the lease or as changed under s. 7C - and from the sender's own most-recently provided electronic address."
    statute_ref: "Residential Tenancies Act, R.S.N.S. 1989, c. 401, ss. 15(1)(e) and 15(2)(e) (substituted by S.N.S. 2024, c. 12, s. 21; related ss. 7B-7C added by S.N.S. 2024, c. 12, s. 5)"
    source: *nspage
    valid_from: 2025-04-30
    valid_to: null
    example_clause_text: "SYNTHETIC: Notices may be delivered by any electronic means to any address the Landlord deems appropriate."
    expected_flag: flag
    expected_explanation_points:
      - "electronic service validity depends on the most-recently provided electronic address (in the lease or updated under RTA s. 7C), not any address a party picks"
      - "both directions are regulated: sent to the recipient's recorded address and from the sender's own recorded address"
      - "why the recorded-address rule protects both parties"
    notes: "Pairs with the completeness check - the recorded email is one of the contact anchors. Traced 2026-06-11 (T9C). valid_from corrected 2024-09-20 -> 2025-04-30: the seed date was the Royal Assent date of S.N.S. 2024, c. 12, but bill ss. 5 and 21 commenced by proclamation on 2025-04-30 (OLC proclamation record). A prior, different electronic-service regime existed from 2023-02-03 (2021, c. 36, s. 13); it was not traced in this pass and is NOT modeled by this row. rule_summary rewritten at trace time per plan §2 step 8; seed wording was: 'Documents served by email must be sent from/to the email address recorded in the lease.' (supported in substance; narrowed: 'electronic address', most-recently-provided incl. s. 7C updates, and the s. 13 / Small Claims carve-out)."
    trace_status: traced
    confidence: high
