# BYS reference clause dataset — SEED (a37)
# Status: SEED ONLY — 7 sample rows demonstrating structure. This dataset is
# NOT complete and must not be represented as complete, validated, or
# production-ready. Target size per the CC/CD practice (a11): 20-50 rows,
# including >=10 complete / >=10 missing-field leases for the completeness
# check (a36 success criteria). Current coverage is far below both targets.
# Purpose: evidence/productization asset (expected product behaviour per
# clause situation). It records what rules say and what BYS should flag and
# explain — it is NOT legal interpretation or legal advice.
# Provenance discipline: every row names its source and read date. statute_ref
# is a TO-TRACE placeholder until each rule is verified against the
# Residential Tenancies Act / Regulations text (the ship gate from a36/a38).
# All example_clause_text values are SYNTHETIC examples written for this
# dataset; none are drawn from real leases.
# Validity discipline: valid_from / valid_to bound the period the rule row
# applies; null valid_to = currently in force, no known end date; the
# 2027-12-31 rent-cap expiry is a live valid_to (see
# content/ns-tenancy-dates-calendar.md - calendar and dataset update together).

