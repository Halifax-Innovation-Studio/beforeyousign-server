  - id: rc-001
    clause_type: rent-escalation
    jurisdiction: NS
    rule_summary: "For rent increases from 1 Jan 2024 to 31 Dec 2027, a landlord may not increase an existing tenant's rent by more than 5% above the amount the tenant was legally required to pay in the preceding 12-month period; the cap regime expires after 31 Dec 2027."
    statute_ref: "Interim Residential Rental Increase Cap Act, S.N.S. 2021, c. 22, ss. 3, 4, 7; Interim Residential Rental Increase Cap Regulations, N.S. Reg. 79/2023, ss. 3-4"
    source: *nspage
    valid_from: 2024-01-01
    valid_to: 2027-12-31
    example_clause_text: "SYNTHETIC: Rent shall increase by 4% on each anniversary of the commencement date."
    expected_flag: ok
    expected_explanation_points:
      - "increase is within the 5% cap in force for increases from 1 Jan 2024 to 31 Dec 2027"
      - "the cap applies to existing tenants (including a new fixed-term lease with the same tenant); exclusions exist (income-based public housing, compliant land-lease communities)"
      - "cap regime ends 31 Dec 2027; what applies after is not yet known"
      - "as-of date of this explanation"
    notes: "Within-cap case. Pair row for the boundary (exactly 5%) belongs in the full dataset. Traced 2026-06-11 (T9D). valid_from corrected 2026-01-01 -> 2024-01-01 per the approved legal-effective-date ruling: 5% is set by N.S. Reg. 79/2023 ss. 3-4 for the 2024 and 2025 periods and by Act s. 4(1)(d)-(e) for 2026-2027 (the seed date was the start of the current-period clause only). The earlier 2% period (to 2023-12-31, s. 4(1)(a)) is NOT modeled by this row. Baseline is the rent legally required in the preceding 12-month period; the cap operates in addition to RTA s. 11 timing/notice restrictions, which are not modeled here. Act s. 5 (tenant reimbursement application) survives to 2028-12-31. Seed rule_summary was: 'Rent increases are capped at 5% per year from 1 Jan 2026; cap regime in place until 31 Dec 2027.'"
    trace_status: traced
    confidence: high
    trace_sources:
      - source_type: statute
        title: "Interim Residential Rental Increase Cap Act, S.N.S. 2021, c. 22 (official consolidation to April 30, 2025)"
        url: "https://nslegislature.ca/sites/default/files/legc/statutes/interim%20residential%20rental%20increase%20cap.pdf"
        publisher: "Office of the Legislative Counsel, Nova Scotia House of Assembly"
        retrieved_date: 2026-06-11
        provision: "ss. 3, 4(1)-(2), 7"
        quote_or_summary: "s. 4(1): 'a landlord shall not increase the rent payable by an existing tenant by more than ... (b) from January 1, 2024, to December 31, 2024, inclusive, the amount permitted by the regulations; (c) from January 1, 2025, to December 31, 2025, inclusive, the amount permitted by the regulations; (d) from January 1, 2026, to December 31, 2026, inclusive, five per cent; (e) from January 1, 2027, to December 31, 2027, inclusive, five per cent, above the amount that the tenant was legally required to pay in the preceding 12-month period.' s. 7(1): 'This Act, except Section 5, expires and ceases to have any force or effect after December 31, 2027.'"
        notes: "s. 4 history: 2021, c. 22, s. 4; 2023, c. 7, s. 1; 2024, c. 12, s. 1. s. 3(2)-(3) exclusions: income-based public housing; land-lease communities complying with RTA s. 11B. s. 4(2): applies to a new fixed-term lease with an existing tenant. s. 7(2): s. 5 survives to December 31, 2028."
      - source_type: regulation
        title: "Interim Residential Rental Increase Cap Regulations, N.S. Reg. 79/2023 (consolidation)"
        url: "https://novascotia.ca/just/regulations/regs/irricregs.htm"
        publisher: "Province of Nova Scotia (Office of the Registrar of Regulations)"
