        quote_or_summary: "s. 3: 'The maximum permitted rent increase amount under clause 4(1)(b) of the Act for rent increases from January 1, 2024, to December 31, 2024, inclusive, is 5%.' s. 4: 'The maximum permitted rent increase amount under clause 4(1)(c) of the Act for rent increases from January 1, 2025, to December 31, 2025, inclusive, is 5%.'"
        notes: "Establishes 5% for the 2024 and 2025 periods, making 2024-01-01 the legal start of the 5% rate. The online consolidation is unofficial (official record: Registrar of Regulations / Royal Gazette Part II); the page's Registrar history table cites the Gazette Part II issue of 2023-05-19. Gazette issue not separately pulled - noted per approval-record ruling 5."
      - source_type: locator
